name: Mutation testing

# Epic U (1.1.0-alpha.1) — scheduled mutmut run + breaking-change gate.
#
# Why this isn't in the main PR matrix: mutmut is slow (single-file run
# is 5–15 min, full critical-path set sequentially overran the 60-min
# and even 180-min single-job budgets). Gating every PR on kill-rate
# would be noisy + wall-clock-expensive.
#
# Sharding: each file in ``[tool.mutmut].paths_to_mutate`` runs in its
# own parallel matrix job; total wall-clock is max-per-file (~15 min)
# instead of sum (~3 h+). Each shard uploads its ``mutmut results``
# text; the ``enforce`` job downloads them all and runs the kill-rate
# baseline gate.
#
# The actual gates:
#   - schedule: Monday 06:00 UTC — full run on the module set in
#     pyproject.toml's [tool.mutmut].paths_to_mutate.
#   - workflow_dispatch: maintainer-triggered ad-hoc re-run.
#   - pull_request with "breaking-change" label: runs only on the files
#     the PR modifies, enforces baselines from tests/mutmut_baselines.json.
#
# A scheduled failure opens an issue; a PR failure blocks merge.

on:
  schedule:
    # First day of the week, 06:00 UTC. Lines up with the Monday
    # maintainer schedule without hitting GitHub's weekend rate caps.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}
  pull_request:
    types: [labeled, synchronize]
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

# Pin once so every job — and the enforce script's baseline keys —
# stays in sync. Bumping this requires re-keying tests/mutmut_baselines.json
# (mutation IDs are not stable across major versions).
env:
  MUTMUT_VERSION: "2.5.0"

jobs:
  setup:
    # For PR events, only run when the `breaking-change` label is
    # present. The `synchronize` event fires on every push to a labelled
    # PR; the check still gates on the label being present when the run
    # starts.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'breaking-change')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      paths: ${{ steps.compute.outputs.paths }}
      skip: ${{ steps.compute.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch enough history for `git diff origin/main...HEAD` on PR
          # events.
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set Python 3.13
        run: uv python install 3.13

      - name: Install
        run: uv sync --all-extras --dev

      - name: Compute paths-to-mutate
        id: compute
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Only mutate critical-path files the PR actually touched.
            changed=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
              | grep -E '^forge/(feature_injector|merge|provenance|updater|injectors/python_ast|injectors/ts_ast)\.py$' \
              || true)
            if [ -z "$changed" ]; then
              echo "No critical-path files changed — exiting."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "paths=[]" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            paths_json=$(echo "$changed" | python -c 'import json,sys; print(json.dumps([l for l in sys.stdin.read().splitlines() if l]))')
          else
            # Scheduled or manual run — mutate the full critical-path
            # set from pyproject.toml.
            paths_json=$(uv run python -c "import json, tomllib; print(json.dumps(tomllib.loads(open('pyproject.toml','rb').read().decode())['tool']['mutmut']['paths_to_mutate']))")
          fi
          echo "paths=$paths_json" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Sharding mutmut across: $paths_json"

  mutate:
    needs: setup
    if: needs.setup.outputs.skip != 'true'
    runs-on: ubuntu-latest
    # Per-file budget — single-file mutmut runs typically take 90–120 min
    # on the critical-path files; 120 min is a comfortable ceiling for
    # outliers without bleeding into the next scheduled cycle.
    timeout-minutes: 120
    strategy:
      # Don't cancel sibling shards when one fails — we want full
      # baseline data per file even if one shard misbehaves.
      fail-fast: false
      matrix:
        path: ${{ fromJSON(needs.setup.outputs.paths) }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set Python 3.13
        run: uv python install 3.13

      - name: Install
        run: uv sync --all-extras --dev

      - name: Run mutmut on ${{ matrix.path }}
        run: |
          set -euo pipefail
          # ``uvx mutmut`` per the comment on ``[tool.mutmut]`` in
          # pyproject.toml — mutmut is intentionally NOT in dev-deps so
          # the analysis tool stays out of the regular dependency
          # surface. Pin via the workflow-level env so every step (and
          # the enforce script's baseline keys) stay in sync.
          file="${{ matrix.path }}"
          echo "::group::mutmut run on $file"
          uvx "mutmut@${MUTMUT_VERSION}" run --paths-to-mutate "$file" || true
          uvx "mutmut@${MUTMUT_VERSION}" results > "mutmut-results-${file//\//_}.txt" || true
          echo "::endgroup::"

      - name: Sanitize artifact name
        id: artname
        run: |
          path="${{ matrix.path }}"
          # GitHub artifact names can't contain '/'.
          echo "name=mutmut-results-shard-${path//\//_}" >> "$GITHUB_OUTPUT"

      - name: Upload shard results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artname.outputs.name }}
          path: mutmut-results-*.txt
          retention-days: 30

  enforce:
    needs: [setup, mutate]
    # ``always()`` so a single shard timeout doesn't skip the gate —
    # the enforce script tolerates partial input and only fails on
    # genuine baseline regressions.
    if: always() && needs.setup.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set Python 3.13
        run: uv python install 3.13

      - name: Install
        run: uv sync --all-extras --dev

      - name: Download all shard results
        uses: actions/download-artifact@v4
        with:
          pattern: mutmut-results-shard-*
          path: shard-results
          merge-multiple: false

      - name: Enforce kill-rate baselines
        run: uv run python .github/workflows/scripts/mutmut_enforce.py shard-results
