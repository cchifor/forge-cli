name: {{project_slug}}
description: "{{description}}"
publish_to: none
version: {{version}}+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # UI / Theme
  cupertino_icons: ^1.0.8
  flex_color_scheme: ^8.1.0
  google_fonts: ^8.0.2

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  flutter_hooks: ^0.21.2
  hooks_riverpod: ^3.1.0

  # Networking
  dio: ^5.7.0
{%- if include_openapi %}
  retrofit: ^4.9.2
{%- endif %}

  # Routing
  go_router: ^17.1.0

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

{%- if include_auth %}

  # Auth
  flutter_appauth: ^12.0.0
  flutter_secure_storage: ^10.0.0
  url_launcher: ^6.3.1
{%- endif %}

  # Storage
  shared_preferences: ^2.5.3

  # Utilities
  collection: ^1.19.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^3.0.6
  json_serializable: ^6.9.4
  riverpod_generator: ^4.0.0+1
  go_router_builder: ^4.2.1
{%- if include_openapi %}
  retrofit_generator: ^10.2.1
{%- endif %}

  # Linting
  flutter_lints: ^6.0.0
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

{%- if include_openapi %}

  # OpenAPI Code Generation
  swagger_parser: ^1.5.0
{%- endif %}

  # Testing
  mocktail: ^1.0.4
  # import_lint: ^0.1.6  # Add if needed for import analysis

flutter:
  uses-material-design: true
