# Qdrant adapter — registers itself with the container only when the
# user opts into `rag.backend=qdrant`. Port ships from vector_store_port.

- target: src/app/core/container.py
  marker: FORGE:APP_POST_CONFIGURE
  position: after
  zone: generated
  snippet: |-
    # Vector-store adapter: Qdrant — accessor (lazy singleton). Init
    # opens an async client; deferring it to first call keeps imports
    # cheap and lets dev boxes without a running qdrant load the module.
    import os as _qdrant_os

    from app.adapters.vector_store.qdrant import QdrantAdapter as _QdrantAdapter

    _qdrant_adapter: _QdrantAdapter | None = None


    def get_qdrant_adapter() -> _QdrantAdapter:
        global _qdrant_adapter
        if _qdrant_adapter is None:
            _qdrant_adapter = _QdrantAdapter(
                url=_qdrant_os.environ.get("QDRANT_URL", "http://localhost:6333"),
                api_key=_qdrant_os.environ.get("QDRANT_API_KEY"),
                collection_prefix=_qdrant_os.environ.get("QDRANT_COLLECTION", "default"),
            )
        return _qdrant_adapter
