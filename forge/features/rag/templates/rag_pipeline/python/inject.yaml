# rag_pipeline injections.
# 1. Mount /api/v1/rag router for ingest/search.
# 2. At lifecycle startup, explicitly call `register_rag_search_tool()` to
#    add the `rag_search` tool to the agent ToolRegistry when `agent_tools`
#    is also enabled. The register function returns False (no-op) otherwise,
#    so users can enable rag_pipeline alone and still get the REST endpoints.

- target: src/app/api/v1/api.py
  marker: FORGE:API_ENDPOINT_IMPORTS
  position: before
  snippet: "from app.api.v1.endpoints import rag as rag_endpoint"

- target: src/app/api/v1/api.py
  marker: FORGE:API_ROUTER_REGISTRATION
  position: before
  snippet: 'api_router.include_router(rag_endpoint.router, prefix="/rag", tags=["rag"])'

- target: src/app/core/lifecycle.py
  marker: FORGE:LIFECYCLE_STARTUP
  position: before
  snippet: |-
    from app.rag.rag_search_tool import register_rag_search_tool
    register_rag_search_tool()
