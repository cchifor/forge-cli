# Strict Content-Security-Policy + related security headers.
#
# Drop this include() into any nginx server{} block:
#
#     server {
#         ...
#         include infra/nginx-csp.conf;
#     }
#
# The nonce placeholder `$csp_nonce` is set by the frontend build (Vite
# plugin: vite-plugin-csp-guard) and injected per-response. No
# unsafe-inline or unsafe-eval in production.

# Strict-Transport-Security — tell browsers to only use HTTPS for this host
# and every subdomain, for two years. Only send once HTTPS is in place!
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

# Prevent MIME sniffing
add_header X-Content-Type-Options "nosniff" always;

# Prevent clickjacking — use frame-ancestors in CSP instead for modern browsers.
add_header X-Frame-Options "DENY" always;

# Referrer policy — strip referrer on cross-origin navigation.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions-Policy — disable browser features we don't use.
add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;

# Content-Security-Policy — strict policy suited for SPAs + API calls.
# Adjust `connect-src` to include any external APIs your frontend calls.
add_header Content-Security-Policy "
    default-src 'self';
    script-src 'self' 'nonce-$csp_nonce' 'strict-dynamic';
    style-src 'self' 'nonce-$csp_nonce';
    img-src 'self' data: blob:;
    font-src 'self' data:;
    connect-src 'self' ws: wss:;
    frame-ancestors 'none';
    form-action 'self';
    base-uri 'self';
    object-src 'none';
    require-trusted-types-for 'script';
" always;
